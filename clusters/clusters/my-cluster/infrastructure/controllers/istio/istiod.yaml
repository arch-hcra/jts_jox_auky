  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  dependsOn:
    - name: istio-base
      namespace: flux-system
  chart:
    spec:
      chart: istiod
      version: "1.23.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system