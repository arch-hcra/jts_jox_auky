apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istiod
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  dependsOn:
    - name: istio-base
      namespace: flux-system
  chart:
    spec:
      chart: istiod
      version: "1.22.3"
      sourceRef:
        kind: HelmRepository
        name: helmrepo
        namespace: flux-system
  values:
    pilot:
      autoscaleEnabled: false
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 250m
          memory: 512Mi
