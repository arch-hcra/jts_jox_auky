apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-control-plane
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  chart:
    spec:
      chart: istio-control-plane
      version: "1.23.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    gateways:
      istio-ingressgateway:
        enabled: true
        replicaCount: 1
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        service:
          type: NodePort