apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  dependsOn:
    - name: istiod
      namespace: flux-system
  chart:
    spec:
      chart: gateway
      version: "1.22.3"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    defaults:
      autoscaling:
        enabled: false
      replicaCount: 1
      service:
        type: NodePort
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
