apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.21.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  install:
    timeout: 10m
  values:
    labels:
      app: istio-ingressgateway
      istio: ingressgateway
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

