apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  interval: 1m
  chart:
    spec:
      chart: gateway
      version: "1.22.3"
      sourceRef:
        kind: HelmRepository
        name: istio-official
        namespace: flux-system
  install:
    disableSchemaValidation: true
  upgrade:
    disableSchemaValidation: true
  values: {}
  