apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: flux-system
spec:
  interval: 5m
  targetNamespace: istio-system
  chart:
    spec:
      chart: gateway
      version: "1.21.2"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    service:
      type: NodePort
    servicePorts:
      - name: http2
        port: 80
        targetPort: 8080
        protocol: TCP
      - name: https
        port: 443
        targetPort: 8443
        protocol: TCP
    serviceLabels:
      app: istio-ingressgateway
      istio: ingressgateway
