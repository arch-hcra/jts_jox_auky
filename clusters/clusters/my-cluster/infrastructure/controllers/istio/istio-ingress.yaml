apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: istio-ingressgateway
  namespace: flux-system
spec:
  dependsOn:
    - name: istiod
  interval: 10m
  chart:
    spec:
      chart: gateway
      version: "1.23.0"
      sourceRef:
        kind: HelmRepository
        name: istio
        namespace: flux-system
  values:
    name: istio-ingressgateway
    service:
      type: NodePort
      ports:
        - name: http
          port: 80
          nodePort: 30080
          targetPort: 8080
        - name: https
          port: 443
          nodePort: 30443
          targetPort: 8443
